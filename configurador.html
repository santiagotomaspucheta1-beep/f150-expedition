    projectId: "f150-9a6e4",

    appId: "1:974737504661:web:abaffde9d112e91654de9c",

  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  
  let fbData = {};
  let ignoreNextSave = false;
  
  const originalSetItem = localStorage.setItem.bind(localStorage);
  
  // Interceptar fetch de la propia página para evitar que el hot-reloader de dc-runtime
  // descargue el HTML crudo sin procesar y corrompa la plantilla con comillas JSON escapadas.
  const originalFetch = window.fetch;
  window.fetch = function(url, options) {
    if (typeof url === 'string' && (url === location.href || url.split('?')[0] === location.href.split('?')[0])) {
      return Promise.reject(new Error("Deshabilitado fetch de la url propia para evitar corrupción de plantilla"));
    }
    return originalFetch.apply(this, arguments);
  };
  
  const targetKey = 'f150-overlanding-v2';
  
  db.collection('configurador').doc('estado').get().then(doc => {
    if (doc.exists) {
      const data = doc.data();
      let changed = false;
      if (data[targetKey] !== undefined && localStorage.getItem(targetKey) !== data[targetKey]) {
        originalSetItem(targetKey, data[targetKey]);
        changed = true;
      }
      if (changed) {
        window.location.reload();
      }
    }
    
    db.collection('configurador').doc('estado').onSnapshot(snap => {
      if (!snap.exists) return;
      const data = snap.data();
      let changed = false;
      if (data[targetKey] !== undefined && localStorage.getItem(targetKey) !== data[targetKey]) {
        originalSetItem(targetKey, data[targetKey]);
        changed = true;
      }
      if (changed) {
        window.location.reload();
      }

      console.error("Error escuchando cambios del configurador en Firebase:", e);
    });
  });

  localStorage.setItem = function(key, value) {
    originalSetItem(key, value);
    if (key !== targetKey) return; // SOLO sincronizar los datos de la app
    if (ignoreNextSave) return;
    fbData[key] = value;
    db.collection('configurador').doc('estado').set(fbData)

        console.error("Error guardando en Firestore:", e);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');

      .replace(/\\"/g, '"');

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-align:right\"><span style=\"color:#5a6272\">cm</span></span>\n          </div>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n            <span style=\"color:#8b93a3\">Altura techo levantado</span>\n            <span style=\"display:flex;align-items:center;gap:4px\"><input type=\"number\" value=\"{{dimHR}}\" onchange=\"{{setDimHR}}\" style=\"width:60px;background:#0e1013;border:1px solid #2a2f38;color:#e8eaee;padding:4px 6px;border-radius:4px;font-size:12px;text-align:right\"><span style=\"color:#5a6272\">cm</span></span>\n          </div>\n        </div>\n      </div>\n\n      <div style=\"background:#101216;border:1px solid #1e2229;border-radius:8px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,0.3)\">\n        <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;color:#4aa3df;margin-bottom:6px\">PASILLO LIBRE</div>\n        <div style=\"display:flex;align-items:baseline;gap:6px\">\n          <span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:32px;color:{{pasilloColor}}\">{{pasillo}}</span>\n          <span style=\"font-size:12px;color:#8b93a3\">cm entre m\u00f3dulos</span>\n        </div>\n        <div style=\"font-size:10px;color:#5a6272;margin-top:4px\">Se calcula autom\u00e1ticamente seg\u00fan la posici\u00f3n de los m\u00f3dulos</div>\n      </div>\n\n      <div style=\"background:#101216;border:1px solid #1e2229;border-radius:8px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,0.3)\">\n        <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;color:#ffffff;margin-bottom:12px\">ZONAS FUNCIONALES</div>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{zonesLegend}}\" as=\"zn\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;gap:10px\">\n              <span style=\"width:12px;height:12 272;letter-spacing:2px\">\u25b2 CABINA</div>\n              <div style=\"position:absolute;left:40px;top:{{planBottomY}}px;width:{{bedW}}px;text-align:center;font-size:9px;color:#5a6272;letter-spacing:2px\">\u25bc PORT\u00d3N TRASERO</div>\n              <!-- caja -->\n              <div style=\"position:absolute;left:40px;top:40px;width:{{bedW}}px;height:{{bedH}}px;background:#3d2f21;border:2px solid #3a4150;border-radius:2px;background-image:repeating-linear-gradient(90deg, rgba(0,0,0,0.14) 0px, rgba(0,0,0,0.14) 1px, transparent 1px, transparent 66px)\">\n              </div>\n              <!-- pasa-ruedas -->\n              <div style=\"position:absolute;left:40px;top:{{wwTop}}px;width:{{wwW}}px;height:{{wwH}}px;background:#101216;border:1px solid #2a2f38;display:flex;align-items:center;justify-content:center\"><span style=\"font-size:8px;color:#5a6272;writing-mode:vertical-rl\">RUEDA</span></div>\n              <div style=\"position:absolute;left:{{wwLeft2}}px;top:{{wwTop}}px;width:{{wwW}}px;height:{{wwH}}px;background:#101216;border:1px solid #2a2f38;display:flex;align-items:center;justify-content:center\"><span style=\"font-size:8px;color:#5a6272;writing-mode:vertical-rl\">RUEDA</span></div>\n              <!-- m\u00f3dulos -->\n              <sc-for list=\"{{planMods}}\" as=\"m\" hint-placeholder-count=\"3\">\n                <div onpointerdown=\"{{m.dragStart}}\" onclick=\"{{stopClick}}\" style=\"position:absolute;left:{{m.left}}px;top:{{m.top}}px;width:{{m.w}}px;height:{{m.h}}px;background:{{m.bg}};border:{{m.bw}}px solid {{m.bc}};border-radius:3px;cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;overflow:hidden;user-select:none;touch-action:none\">\n                  <span style=\"width:20px;height:20px;border-radius:50%;background:{{m.color}};color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0\">{{m.num}}</span>\n                  <span style=\"font-size:10px;color:#e8eaee;text-align:center;line-height:1.2;padding:0 4px\">{{m.name}}</span>\n                  <span style=\"font-size:9px;color:#aab0c0\">{{m.dimTxt}}</span>\n                </div>\n              </sc-for>\n            </div>\n          </div>\n        </sc-if>\n\n        <sc-if value=\"{{isSides}}\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:16px;padding:20px;justify-content:center\">\n            <!-- LATERAL -->\n            <div style=\"background:#101216;border:1px solid #23272f;border-radius:6px;padding:14px\">\n              <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1.5px;color:#ffffff;margin-bottom:8px\">VISTA LATERAL <span style=\"color:#5a6272;font-size:11px\">(cabina a la izquierda)</span></div>\n              <div style=\"position:relative;width:{{latW}}px;height:{{sidePanelH}}px\">\n                <sc-if value=\"{{roofUp}}\">\n                  <div style=\"position:absolute;left:30px;bottom:{{wedgeBottom}}px;width:{{latShellW}}px;height:{{latWedgeH}}px;background:rgba(143,136,104,0.75);clip-path:polygon(0 0, 100% 100%, 0 100%)\"></div>\n                </sc-if>\n                <div style=\"position:absolute;left:30px;bottom:30px;width:{{latShellW}}px;height:{{latShellH}}px;border:1px dashed #4a5262;background:rgba(46,51,61,0.25)\"></div>\n                <sc-for list=\"{{latMods}}\" as=\"m\" hint-placeholder-count=\"3\">\n                  <div style=\"position:absolute;left:{{m.left}}px;bottom:30px;width:{{m.width}}px;height:{{m.height}}px;background:{{m.bg}};border:1px solid {{m.bc}};display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 4px\"><span style=\"font-size:9px;color:{{m.bc}}\">{{m.num}}</span></div>\n                </sc-for>\n                <div style=\"position:absolute;left:0;right:0;bottom:29px;border-bottom:1px solid #3a4150\"></div>\n                <div style=\"position:absolute;left:{{latLabelX}}px;bottom:{{latHalfY}}px;font-size:10px;color:#8b93a3\">{{hLabel}}</div>\n                <sc-if value=\"{{roofUp}}\">\n                  <div style=\"position:absolute;left:{{latLabelX}}px;bottom:{{latTopY}}px;font-size:10px;color:#e8c14b\">{{hrLabel}}</div>\n                </sc-if>\n              </div>\n            </div>\n            <!-- TRASERA -->\n            <div style=\"background:#101216;border:1px solid #23272f;border-radius:6px;padding:14px\">\n              <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1.5px;color:#ffffff;margin-bottom:8px\">VISTA TRASERA <span style=\"color:#5a6272;font-size:11px\">(corte esquem\u00e1tico)</span></div>\n              <div style=\"position:relative;width:{{rearW}}px;height:{{sidePanelH}}px\">\n                <div style=\"position:absolute;left:30px;bottom:30px;width:{{rearShellW}}px;height:{{latShellH}}px;border:1px dashed #4a5262;background:rgba(46,51,61,0.25)\"></div>\n                <sc-for list=\"{{rearMods}}\" as=\"m\" hint-placeholder-count=\"3\">\n                  <div style=\"position:absolute;left:{{m.left}}px;bottom:30px;width:{{m.width}}px;height:{{m.height}}px;background:{{m.bg}};border:1px solid {{m.bc}};display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 4px\"><span style=\"font-size:9px;color:{{m.bc}}\">{{m.num}}</span></div>\n                </sc-for>\n                <div style=\"position:absolute;left:0;right:0;bottom:29px;border-bottom:1px solid #3a4150\"></div>\n                <div style=\"position:absolute;left:40px;bottom:8px;font-size:9px;color:#5a6272;letter-spacing:1px\">IZQUIERDA (conductor) \u2192 DERECHA</div>\n              </div>\n            </div>\n          </div>\n        </sc-if>\n\n      </div>\n    </div>\n\n    <!-- COLUMNA DERECHA: M\u00d3DULOS -->\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n\n      <div style=\"background:#101216;border:1px solid #1e2229;border-radius:8px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,0.3)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;color:#ffffff\">M\u00d3DULOS <span style=\"color:#5a6272;font-size:12px\">({{modCount}})</span></div>\n          <button onclick=\"{{addModule}}\" style=\"background:#1c212b;border:1px solid #3a4150;color:#58b368;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:600\">+ AGREGAR</button>\n        </div>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <sc-for list=\"{{modVMs}}\" as=\"m\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{m.select}}\" style=\"display:flex;align-items:center;gap:10px;padding:9px 10px;background:{{m.rowBg}};border:1px solid {{m.rowBorder}};border-radius:5px;cursor:pointer\">\n              <span style=\"width:22px;height:22px;border-radius:50%;background:{{m.color}};color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0\">{{m.num}}</span>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:11px;font-weight:600;color:#e8eaee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{m.name}}</div>\n                <div style=\"font-size:9px;color:#5a6272;margin-top:2px\">{{m.dimTxt}}</div>\n              </div>\n              <button onclick=\"{{m.del}}\" style=\"background:transparent;border:none;color:#5a6272;font-size:14px;cursor:pointer;padding:2px 4px\" style-hover=\"color:#e05555\">\u2715</button>\n            </div>\n          </sc-for>\n        </div>\n      </div>\n\n      <sc-if value=\"{{hasSel}}\">\n        <div style=\"background:#101216;border:1px solid #e8c14b;border-radius:8px;padding:14px;box-shadow:0 4px 24px rgba(232,193,75,0.12)\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;color:#e8c14b;margin-bottom:12px\">EDITAR M\u00d3DULO {{selNum}}</div>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:11px\">\n            <div>\n              <div style=\"color:#8b93a3;margin-bottom:4px\">Nombre</div>\n              <input type=\"text\" value=\"{{selName}}\" onchange=\"{{setSelName}}\" style=\"width:100%;background:#0e1013;border:1px solid #2a2f38;color:#e8eaee;padding:6px 8px;border-radius:4px;font-size:12px\">\n            </div>\n            <div>\n              <div style=\"color:#8b93a3;margin-bottom:4px\">Zona funcional</div>\n              <select value=\"{{selZone}}\" onchange=\"{{setSelZone}}\" style=\"width:100%;background:#0e1013;border:1px solid #2a2f38;color:#e8eaee;padding:6px 8px;border-radius:4px;font-size:12px\">\n                <option value=\"A\">Zona A \u2014 Cocina / Agua</option>\n                <option value=\"B\">Zona B \u2014 Pasillo</option>\n                <option value=\"C\">Zona C \u2014 El\u00e9ctrico</option>\n                <option value=\"D\">Zona D \u2014 Recovery / Herramientas</option>\n              </select>\n            </div>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">\n              <div>\n                <div style=\"color:#8b93a3;margin-bottom:4px\">Desde cabina (cm)</div>\n                <input type=\"number\" value=\"{{selX}}\" onchange=\"{{setSelX}}\" style=\"width:100%;background:#0e1013;border:1px solid #2a2f38;color:#e8eaee;padding:6px 8px;border-radius:4px;font-size:12px\">\n              </div>\n              <div>\n                <div style=\"color:#8b93a3;margin-bottom:4px\">Desde pared izq. (cm)</div>\n                <input type=\"number\" value=\"{{selZ}}\" onchange=\"{{setSelZ}}\" style=\"width:100%;background:#0e1013;border:1px solid #2a2f38;color:#e8eaee;padding:6px 8px;border-radius:4px;font-size:12px\">\n              </div>\n            </div>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px\">\n              <div>\n                <div style=\"color:#8b93a3;margin-bottom:4px\">Largo (cm)</div>\n                <input type=\"number\" value=\"{{selL}}\" onchange=\"{{setSelL}}\" style=\"width:100%;background:#0e1013;border:1px solid #2a2f38;color:#e8eaee;padding:6px 8px;border-radius:4px;font-size:12px\">\n              </div>\n              <div>\n                <div style=\"color:#8b93a3;margin-bottom:4px\">Ancho (cm)</div>\n                <input type=\"number\" value=\"{{selW}}\" onchange=\"{{setSelW}}\" style=\"width:100%;background:#0e1013;border:1px solid #2a2f38;color:#e8eaee;padding:6px 8px;border-radius:4px;font-size:12px\">\n              </div>\n              <div>\n                <div style=\"color:#8b93a3;margin-bottom:4px\">Alto (cm)</div>\n                <input type=\"number\" value=\"{{selH}}\" onchange=\"{{setSelH}}\" style=\"width:100%;background:#0e1013;border:1px solid #2a2f38;color:#e8eaee;padding:6px 8px;border-radius:4px;font-size:12px\">\n              </div>\n            </div>\n            <div style=\"display:flex;gap:8px;margin-top:4px\">\n              <button onclick=\"{{dupSel}}\" style=\"flex:1;background:#1c212b;border:1px solid #3a4150;color:#aab0c0;padding:7px;border-radius:4px;font-size:11px;cursor:pointer\">DUPLICAR</button>\n              <button onclick=\"{{delSel}}\" style=\"flex:1;background:#1c212b;border:1px solid #4a2a2a;color:#e05555;padding:7px;border-radius:4px;font-size:11px;cursor:pointer\">ELIMINAR</button>\n            </div>\n          </div>\n        </div>\n      </sc-if>\n\n      <sc-if value=\"{{noSel}}\">\n        <div style=\"background:#111318;border:1px dashed #2a2f38;border-radius:6px;padding:16px;font-size:11px;color:#5a6272;text-align:center;line-height:1.6\">Seleccion\u00e1 un m\u00f3dulo en la lista, en el 3D o en la planta para editarlo. En la planta pod\u00e9s arrastrarlos.</div>\n      </sc-if>\n\n    </div>\n  </div>\n\n  <!-- EQUIPAMIENTO -->\n  <div style=\"padding:0 12px 18px\">\n    <div style=\"background:#101216;border:1px solid #1e2229;border-radius:8px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,0.3)\">\n      <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:1.5px;color:#ffffff;margin-bottom:14px\">EQUIPAMIENTO <span style=\"color:#5a6272;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:400\">\u00b7 Enter para agregar \u00edtems</span></div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px\">\n        <sc-for list=\"{{eqCats}}\" as=\"cat\" hint-placeholder-count=\"5\">\n          <div style=\"background:#101216;border:1px solid #23272f;border-radius:5px;padding:12px\">\n            <div style=\"font-size:11px;font-weight:600;letter-spacing:1.5px;color:#e8c14b;margin-bottom:10px;border-bottom:1px solid #23272f;padding-bottom:8px\">{{cat.name}}</div>\n            <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:10px\">\n              <sc-for list=\"{{cat.items}}\" as=\"it\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:#c6ccd6\">\n                  <span style=\"color:#3a4150\">\u25aa</span>\n                  <span style=\"flex:1\">{{it.label}}</span>\n                  <button onclick=\"{{it.del}}\" style=\"background:transparent;border:none;color:#3a4150;font-size:12px;cursor:pointer;padding:0 2px\" style-hover=\"color:#e05555\">\u2715</button>\n                </div>\n              </sc-for>\n            </div>\n            <input type=\"text\" placeholder=\"+ agregar \u00edtem\u2026\" onkeydown=\"{{cat.onAdd}}\" style=\"width:100%;background:#0e1013;border:1px solid #23272f;color:#e8eaee;padding:6px 8px;border-radius:4px;font-size:11px\">\n          </div>\n        </sc-for>\n      </div>\n    </div>\n  </div>\n\n</div>\n\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;anguloTecho&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:28,&quot;min&quot;:15,&quot;max&quot;:40,&quot;step&quot;:1,&quot;unit&quot;:&quot;\u00b0&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Techo&quot;},&quot;etiquetas3d&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Vista 3D&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem('f150-overlanding-v2') || 'null'); } catch (e) {}\n    this.state = (saved && Array.isArray(saved.modules))\n      ? Object.assign(this.defaults(), saved, { view: '3d', selId: null })\n      : this.defaults();\n  }\n\n  defaults() {\n    return {\n      dims: { L: 170, W: 153, H: 113, HR: 280 },\n      roofUp: true, view: '3d', selId: null, showCotas: true,\n      modules: [\n        { id: 'm1', name: 'Mueble izquierdo (cocina)', zone: 'A', x: 0, z: 100, l: 170, w: 53, h: 56 },\n        { id: 'm2', name: 'M\u00f3dulo derecho (el\u00e9ctrico)', zone: 'C', x: 0, z: 0, l: 170, w: 59, h: 102 }\n      ],\n      equipment: {\n        'El\u00e9ctrico': ['Inversor 2000W', 'Cargador DC-DC', 'Controlador solar', 'Caja de fusibles', 'Tomas 12V / USB / 120V'],\n        'Agua': ['Tanque de agua 60 L', 'Bomba 12V', 'Filtro', 'Ducha exterior'],\n        'Cocina': ['Hornalla 1 fuego', 'Bacha con canilla', 'Mesada', 'Tabla de cortar'],\n        'Camper': ['Techo pop-up (wedge)', 'Ventanas gullwing', 'Iluminaci\u00f3n LED', 'Toldo lateral'],\n        'Otros': ['Piso vin\u00edlico', 'Paneles MOLLE', 'Compresor', 'Kit recovery']\n      }\n    };\n  }\n\n  save() {\n    const { dims, roofUp, modules, equipment, showCotas } = this.state;\n    try { localStorage.setItem('f150-overlanding-v2', JSON.stringify({ dims, roofUp, modules, equipment, showCotas })); } catch (e) {}\n  }\n  set(p) { this.setState(p, () => this.save()); }\n  updMod(id, patch) {\n    this.set({ modules: this.state.modules.map(m => m.id === id ? Object.assign({}, m, patch) : m) });\n  }\n  num(v, min, max) {\n    v = Math.round(parseFloat(v));\n    if (isNaN(v)) v = min;\n    return Math.min(max, Math.max(min, v));\n  }\n\n  renderVals() {\n    const st = this.state, d = st.dims, mods = st.modules;\n    const ZONES = {\n      A: { name: 'Cocina / Agua', color: '#58b368' },\n      B: { name: 'Pasillo', color: '#4aa3df' },\n      C: { name: 'El\u00e9ctrico', color: '#f2913d' },\n      D: { name: 'Recovery / Herram.', color: '#e8c14b' }\n    };\n    const zc = z => (ZONES[z] || { color: '#9aa0aa' }).color;\n    const S = 2.6, Sv = 2.0;\n    const sel = mods.find(m => m.id === st.selId) || null;\n    const rgba = (hex, a) => {\n      const n = parseInt(hex.slice(1), 16);\n      return 'rgba(' + (n >> 16) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';\n    };\n\n    // pasillo libre entre m\u00f3dulos izquierda / derecha\n    const lft = mods.filter(m => m.z + m.w / 2 < d.W / 2);\n    const rgt = mods.filter(m => m.z + m.w / 2 >= d.W / 2);\n    const lm = lft.length ? Math.max.apply(null, lft.map(m => m.z + m.w)) : 0;\n    const rm = rgt.length ? Math.min.apply(null, rgt.map(m => m.z)) : d.W;\n    const pasillo = Math.max(0, Math.round(rm - lm));\n\n    const dimSetter = k => e => {\n      const dd = Object.assign({}, this.state.dims);\n      dd[k] = this.num(e.target.value, 40, 500);\n      this.set({ dims: dd });\n    };\n    const selSetter = (k, min, max) => e => {\n      if (!sel) return;\n      const p = {};\n      p[k] = (k === 'name') ? e.target.value : this.num(e.target.value, min, max);\n      this.updMod(sel.id, p);\n    };\n    const mkDrag = m => e => {\n      if (e.button !== 0) return;\n      e.preventDefault();\n      this.set({ selId: m.id });\n      const sx = e.clientX, sy = e.clientY, ox = m.x, oz = m.z;\n      const mv = ev => {\n        const nx = this.num(ox + (ev.clientY - sy) / S, 0, Math.max(0, this.state.dims.L - m.l));\n        const nz = this.num(oz - (ev.clientX - sx) / S, 0, Math.max(0, this.state.dims.W - m.w));\n        this.updMod(m.id, { x: nx, z: nz });\n      };\n      const up = () => {\n        window.removeEventListener('pointermove', mv);\n        window.removeEventListener('pointerup', up);\n      };\n      window.addEventListener('pointermove', mv);\n      window.addEventListener('pointerup', up);\n    };\n\n    const modVMs = mods.map((m, i) => ({\n      num: i + 1, name: m.name, color: zc(m.zone),\n      dimTxt: m.l + ' \u00d7 ' + m.w + ' \u00d7 ' + m.h + ' cm \u00b7 x ' + m.x + ' \u00b7 z ' + m.z,\n      rowBg: m.id === st.selId ? '#1e2430' : '#15171c',\n      rowBorder: m.id === st.selId ? zc(m.zone) : '#262a32',\n      select: () => this.set({ selId: m.id === this.state.selId ? null : m.id }),\n      del: e => {\n        e.stopPropagation();\n        this.set({ modules: this.state.modules.filter(x => x.id !== m.id), selId: null });\n      }\n    }));\n\n    const planMods = mods.map((m, i) => ({\n      num: i + 1, name: m.name,\n      dimTxt: st.showCotas ? (m.l + '\u00d7' + m.w + '\u00d7' + m.h + ' cm') : '',\n      left: Math.round(40 + (d.W - m.z - m.w) * S), top: Math.round(40 + m.x * S),\n      w: Math.round(m.w * S), h: Math.round(m.l * S),\n      bg: rgba(zc(m.zone), m.id === st.selId ? 0.34 : 0.16),\n      bc: zc(m.zone), bw: m.id === st.selId ? 2 : 1,\n      color: zc(m.zone),\n      dragStart: mkDrag(m)\n    }));\n\n    const latMods = mods.map((m, i) => ({\n      num: i + 1,\n      left: Math.round(30 + m.x * Sv), width: Math.round(m.l * Sv), height: Math.round(m.h * Sv),\n      bg: rgba(zc(m.zone), 0.3), bc: zc(m.zone)\n    }));\n    const rearMods = mods.map((m, i) => ({\n      num: i + 1,\n      left: Math.round(30 + (d.W - m.z - m.w) * Sv), width: Math.round(m.w * Sv), height: Math.round(m.h * Sv),\n      bg: rgba(zc(m.zone), 0.3), bc: zc(m.zone)\n    }));\n\n    const eqCats = Object.keys(st.equipment).map(cat => ({\n      name: cat.toUpperCase(),\n      items: st.equipment[cat].map((label, idx) => ({\n        label,\n        del: () => {\n          const eq = Object.assign({}, this.state.equipment);\n          eq[cat] = eq[cat].filter((_, j) => j !== idx);\n          this.set({ equipment: eq });\n        }\n      })),\n      onAdd: e => {\n        if (e.key === 'Enter' && e.target.value.trim()) {\n          const eq = Object.assign({}, this.state.equipment);\n          eq[cat] = eq[cat].concat([e.target.value.trim()]);\n          this.set({ equipment: eq });\n          e.target.value = '';\n        }\n      }\n    }));\n\n    const roofAngle = this.props.anguloTecho != null ? +this.props.anguloTecho : 28;\n    const wedgeH = Math.round(d.L * Math.sin(roofAngle * Math.PI / 180) * Sv);\n    const tabBg = v => st.view === v ? '#1e232d' : 'transparent';\n    const tabBc = v => st.view === v ? '#e8c14b' : 'transparent';\n\n    return {\n      roofLabel: st.roofUp ? '\u2303 TECHO: LEVANTADO' : '\u2304 TECHO: CERRADO',\n      toggleRoof: () => this.set({ roofUp: !this.state.roofUp }),\n      resetAll: () => { if (confirm('\u00bfRestablecer todo al layout inicial? Se pierden los cambios.')) this.set(this.defaults()); },\n\n      dimL: d.L, dimW: d.W, dimH: d.H, dimHR: d.HR,\n      setDimL: dimSetter('L'), setDimW: dimSetter('W'), setDimH: dimSetter('H'), setDimHR: dimSetter('HR'),\n      pasillo,\n      pasilloColor: pasillo >= 60 ? '#58b368' : (pasillo >= 40 ? '#e8c14b' : '#e05555'),\n      zonesLegend: Object.keys(ZONES).map(k => ({\n        key: 'ZONA ' + k, name: ZONES[k].name, color: ZONES[k].color,\n        count: k === 'B' ? '\u2014' : (mods.filter(m => m.zone === k).length + ' m\u00f3d.')\n      })),\n      showCotas: st.showCotas,\n      toggleCotas: () => this.set({ showCotas: !this.state.showCotas }),\n\n      is3d: st.view === '3d', isPlan: st.view === 'plan', isSides: st.view === 'sides',\n      tab3d: () => this.set({ view: '3d' }),\n      tabPlan: () => this.set({ view: 'plan' }),\n      tabSides: () => this.set({ view: 'sides' }),\n      tab3dBg: tabBg('3d'), tabPlanBg: tabBg('plan'), tabSideBg: tabBg('sides'),\n      tab3dBc: tabBc('3d'), tabPlanBc: tabBc('plan'), tabSideBc: tabBc('sides'),\n\n      modules3d: mods,\n      dims3d: { L: d.L, W: d.W, H: d.H },\n      roofUp: st.roofUp,\n      selId: st.selId,\n      selectById: id => this.set({ selId: id }),\n      roofAngle,\n      showLabels3d: this.props.etiquetas3d != null ? !!this.props.etiquetas3d : true,\n\n      planMods,\n      planW: Math.round(40 + d.W * S + 50),\n      planH: Math.round(40 + d.L * S + 60),\n      bedW: Math.round(d.W * S), bedH: Math.round(d.L * S),\n      planBottomY: Math.round(40 + d.L * S + 8),\n      wwTop: Math.round(40 + (d.L * 0.5 - 23) * S),\n      wwH: Math.round(46 * S), wwW: Math.round(22 * S),\n      wwLeft2: Math.round(40 + (d.W - 22) * S),\n      cotaWLabel: d.W + ' cm', cotaLLabel: d.L + ' cm',\n      stopClick: e => e.stopPropagation(),\n      deselect: () => this.set({ selId: null }),\n\n      latMods, rearMods,\n      latW: Math.round(60 + d.L * Sv),\n      latShellW: Math.round(d.L * Sv), latShellH: Math.round(d.H * Sv),\n      latWedgeH: wedgeH,\n      wedgeBottom: Math.round(30 + d.H * Sv),\n      sidePanelH: Math.round(30 + d.H * Sv + (st.roofUp ? wedgeH : 0) + 40),\n      latLabelX: Math.round(30 + d.L * Sv + 8),\n      latHalfY: Math.round(30 + d.H * Sv / 2),\n      latTopY: Math.round(30 + d.H * Sv + wedgeH - 6),\n      rearW: Math.round(60 + d.W * Sv),\n      rearShellW: Math.round(d.W * Sv),\n      hLabel: d.H + ' cm',\n      hrLabel: d.HR + ' cm',\n\n      modVMs, modCount: mods.length,\n      addModule: () => {\n        const id = 'm' + Date.now();\n        this.set({\n          modules: this.state.modules.concat([{ id, name: 'Nuevo m\u00f3dulo', zone: 'A', x: 0, z: 60, l: 60, w: 40, h: 50 }]),\n          selId: id\n        });\n      },\n\n      hasSel: !!sel, noSel: !sel,\n      selNum: sel ? (mods.indexOf(sel) + 1) : '',\n      selName: sel ? sel.name : '', setSelName: selSetter('name'),\n      selZone: sel ? sel.zone : 'A',\n      setSelZone: e => { if (sel) this.updMod(sel.id, { zone: e.target.value }); },\n      selX: sel ? sel.x : 0, setSelX: selSetter('x', 0, 500),\n      selZ: sel ? sel.z : 0, setSelZ: selSetter('z', 0, 500),\n      selL: sel ? sel.l : 0, setSelL: selSetter('l', 10, 500),\n      selW: sel ? sel.w : 0, setSelW: selSetter('w', 10, 300),\n      selH: sel ? sel.h : 0, setSelH: selSetter('h', 5, 250),\n      dupSel: () => {\n        if (!sel) return;\n        const id = 'm' + Date.now();\n        this.set({\n          modules: this.state.modules.concat([Object.assign({}, sel, {\n            id, name: sel.name + ' (copia)',\n            x: Math.min(sel.x + 10, Math.max(0, this.state.dims.L - sel.l)),\n            z: Math.min(sel.z + 10, Math.max(0, this.state.dims.W - sel.w))\n          })]),\n          selId: id\n        });\n      },\n      delSel: () => {\n        if (sel) this.set({ modules: this.state.modules.filter(x => x.id !== sel.id), selId: null });\n      },\n\n      eqCats\n    };\n  }\n}\n\n<\/script>\n\n\n\n</body></html>"</script>
